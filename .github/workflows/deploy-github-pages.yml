# Builds web/ and deploys to GitHub Pages.
# After pushing: Repo → Settings → Pages → Build: GitHub Actions (not "Deploy from branch").
name: Deploy site to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  # Schedules (UTC):
  # - 30 5 * * * — once daily: full data refresh (gate always allows via daily window in script)
  # - 0 * * * *  — every hour: only runs ingest+build in ~36h after each FPL `waivers_time` (from draft
  #   bootstrap-static) or during the 05:26–05:45 daily window (see web/scripts/waiver-refresh-gate.mjs)
  schedule:
    - cron: '30 5 * * *'
    - cron: '0 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Latest run wins — avoids deploy-pages 400 when two runs hit Pages API at once
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Same environment as deploy so FPL_LEAGUE_ID works whether you put it under
    # Repository secrets OR Environment (github-pages) secrets.
    environment:
      name: github-pages
    outputs:
      should_deploy: ${{ steps.gate.outputs.proceed }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Pushes and manual runs always deploy. Scheduled: hourly is gated to post-waiver windows + daily slot.
      - name: Waiver / daily schedule gate
        id: gate
        run: |
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "proceed=1" >> "$GITHUB_OUTPUT"
            echo "Not a cron — full deploy"
            exit 0
          fi
          if node web/scripts/waiver-refresh-gate.mjs; then
            echo "proceed=1" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=0" >> "$GITHUB_OUTPUT"
            echo "Skipped — not in post-waivers or daily catch-up window (see web/scripts/waiver-refresh-gate.mjs)"
          fi

      # League ID: Repository secret/variable FPL_LEAGUE_ID, OR Environment secret on github-pages
      - name: Fetch real league from FPL API
        if: steps.gate.outputs.proceed == '1'
        run: |
          set -e
          ID="${{ secrets.FPL_LEAGUE_ID }}"
          if [ -z "$ID" ]; then ID="${{ vars.FPL_LEAGUE_ID }}"; fi
          if [ -n "$ID" ]; then
            echo "Ingest: league ID is configured — fetching from FPL…"
            python3 -m pip install --user requests
            LEAGUE_ID="$ID" python3 ingest.py
            echo "Ingest OK ($(wc -c < data/details.json) bytes)"
          else
            echo "No FPL_LEAGUE_ID — build will use committed web/public/league-data/ or demo."
            echo "Add secret: Settings → Secrets → Actions → FPL_LEAGUE_ID (your draft league number)"
          fi

      # Relative base (./) so JS + league-data load even if URL casing/path differs
      - name: Install & build
        if: steps.gate.outputs.proceed == '1'
        working-directory: web
        env:
          VITE_BASE_PATH: "./"
          # Same league as ingest — build-draft-picks.mjs regenerates draft_picks.json (avoids shipping a forked TCLOT file).
          FPL_LEAGUE_ID: ${{ secrets.FPL_LEAGUE_ID || vars.FPL_LEAGUE_ID }}
          LEAGUE_ID: ${{ secrets.FPL_LEAGUE_ID || vars.FPL_LEAGUE_ID }}
          # Repository secret/variable, or add the same name under Settings → Environments → github-pages
          VITE_FPL_PROXY_URL: ${{ secrets.VITE_FPL_PROXY_URL || vars.VITE_FPL_PROXY_URL }}
          # Optional per-repo title tile (omit = TCLOT defaults). exFOS / EA Galaxy — use Variables OR Secrets (name must match).
          VITE_LEAGUE_TITLE_ABBR: ${{ secrets.VITE_LEAGUE_TITLE_ABBR || vars.VITE_LEAGUE_TITLE_ABBR }}
          VITE_LEAGUE_TITLE: ${{ secrets.VITE_LEAGUE_TITLE || vars.VITE_LEAGUE_TITLE }}
          # Optional per-repo: omit = show tile. EAGalaxy: set both to false in repo Variables.
          VITE_SHOW_DASHBOARD_TRADES: ${{ vars.VITE_SHOW_DASHBOARD_TRADES }}
          VITE_SHOW_DASHBOARD_HALL: ${{ vars.VITE_SHOW_DASHBOARD_HALL }}
          # Playoff bracket: omit = hidden. ExFOS: set to true in repo Variables.
          VITE_SHOW_DASHBOARD_PLAYOFF: ${{ vars.VITE_SHOW_DASHBOARD_PLAYOFF }}
        run: |
          echo "VITE_BASE_PATH=$VITE_BASE_PATH (relative — use URL with trailing slash: …/repo-name/)"
          if [ -n "$VITE_FPL_PROXY_URL" ]; then
            echo "VITE_FPL_PROXY_URL is set for Vite (Live tab will use your Worker)"
          else
            echo "::warning::VITE_FPL_PROXY_URL empty — add Repository secret (or Variable) named exactly VITE_FPL_PROXY_URL, or an Environment secret on github-pages, then re-run this workflow."
          fi
          echo "VITE_SHOW_DASHBOARD_TRADES=${VITE_SHOW_DASHBOARD_TRADES:-default on} VITE_SHOW_DASHBOARD_HALL=${VITE_SHOW_DASHBOARD_HALL:-default on}"
          if [ -n "${VITE_LEAGUE_TITLE_ABBR:-}" ]; then
            echo "VITE_LEAGUE_TITLE_ABBR is set (branded header can apply — see siteFeatures + public/*-header-brand.png)"
          else
            echo "::notice::VITE_LEAGUE_TITLE_ABBR is empty in this build — title defaults to TCLOT. Set Repository or github-pages: Variable or Secret VITE_LEAGUE_TITLE_ABBR=exFOS or EA Galaxy, then re-run workflow."
          fi
          if [ -z "${FPL_LEAGUE_ID:-}" ]; then
            echo "::notice::FPL_LEAGUE_ID not set for this build — build-draft-picks skipped; committed draft_picks.json is copied to dist. Set Repository or github-pages Environment Actions secret (or Variable) FPL_LEAGUE_ID to your draft league number so CI regenerates draft picks for this repo."
          else
            echo "FPL_LEAGUE_ID is set — build-draft-picks will run during npm run build"
          fi
          npm ci
          npm run build
      - name: Verify league data shipped
        if: steps.gate.outputs.proceed == '1'
        run: |
          test -f web/dist/league-data/details.json || { echo "ERROR: no details.json in dist"; exit 1; }
          test -s web/dist/league-data/details.json || { echo "ERROR: empty details.json"; exit 1; }
          echo "OK — league-data in dist ($(wc -c < web/dist/league-data/details.json) bytes)"
          if grep -q '"isSample".*true' web/dist/league-data/details.json 2>/dev/null; then
            echo "::warning::Site is still DEMO sample data. Set FPL_LEAGUE_ID (secret or variable) or run publish-real-league and commit league-data."
          fi
          PNGS=$(find web/dist/team-logos -maxdepth 1 -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
          echo "Team logo PNGs in build: $PNGS (commit web/public/team-logos/*.png to ship logos)"
          if [ -f web/dist/league-data/pickups-tenure.json ]; then
            N=$(node -e "const j=require('./web/dist/league-data/pickups-tenure.json');console.log((j.teamWaiverInTotals||[]).length)" 2>/dev/null || echo 0)
            echo "pickups-tenure.json team rows: $N"
            if [ "$N" -eq 0 ] && [ -f web/dist/league-data/transactions.json ]; then
              echo "::warning::pickups-tenure has no team totals but transactions exist — check waiver analytics build logs"
            fi
          fi
      - uses: actions/upload-pages-artifact@v5
        if: steps.gate.outputs.proceed == '1'
        with:
          path: web/dist

  deploy:
    if: success() && needs.build.outputs.should_deploy == '1'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
